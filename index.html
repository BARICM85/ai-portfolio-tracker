<!DOCTYPE html>
<html>
<head>
<title>AI Portfolio Tracker V5</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script type="module" src="firebaseConfig.js"></script>
</head>

<body>

<h1>AI Portfolio Tracker V5</h1>

<div>
<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>
<span id="user"></span>
</div>

<hr>

<div class="menu">
<button onclick="showDashboard()">Dashboard</button>
<button onclick="switchPortfolio('A')">Portfolio A</button>
<button onclick="switchPortfolio('B')">Portfolio B</button>
<button onclick="clearPortfolio()">Delete Portfolio</button>
</div>

<hr>

<div>
Nifty: <span id="nifty"></span><br>
Invested: <span id="invested"></span><br>
Current: <span id="current"></span><br>
CAGR: <span id="cagr"></span>
</div>

<hr>

<table>
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Buy</th>
<th>Current</th>
<th>Change</th>
<th>AI</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<hr>

<h3>Portfolio Performance</h3>
<canvas id="portfolioChart"></canvas>

<h3>Sector Allocation</h3>
<canvas id="sectorChart"></canvas>

<h3>Heatmap</h3>
<div id="heatmap"></div>

<hr>

<h3>Excel Upload</h3>
<input type="file" id="excelFile">

<script type="module" src="js/app.js"></script>

</body>
</html>
